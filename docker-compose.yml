services:
  mongodb:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb:/data/db
    ports:
      - '27017:27017'
    networks:
      - network
  redis:
    image: redis
    restart: always
    volumes:
      - redis:/data
    ports:
      - '6379:6379'
    networks:
      - network
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - network

volumes:
  mongodb:
  redis:
  minio:

networks:
  network:
    driver: bridge