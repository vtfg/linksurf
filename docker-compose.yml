services:
  mongodb:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb:/data/db
    ports:
      - '27017:27017'
    networks:
      - network
  redis:
    image: redis
    restart: always
    volumes:
      - redis:/data
    ports:
      - '6379:6379'
    networks:
      - network

volumes:
  mongodb:
  redis:

networks:
  network:
    driver: bridge